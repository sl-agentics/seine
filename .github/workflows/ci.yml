name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The full differential gate: native tests + the entire scenario
  # corpus through BOTH engines (real Drools as the oracle).
  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: Swatinem/rust-cache@v2
      - name: Cache maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('oracle/pom.xml') }}
      - name: Build oracle
        run: cd oracle && mvn -q -DskipTests package
      - name: Native tests
        run: cargo test -q
      - name: Differential corpus
        run: make diff

  bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - name: Install test deps
        run: pip install polars pyarrow pytest maturin
      - name: Build + install seine-rs
        run: |
          maturin build --release -m bindings/Cargo.toml -o dist
          pip install dist/*.whl
      - name: Boundary + authoring + row tests
        run: pytest bindings/tests/ -q

  wheels:
    strategy:
      matrix:
        include:
          # Linux builds run in manylinux_2_28 containers (glibc >= 2.28):
          # RHEL 8 / UBI8, Ubuntu 20.04, Debian 11 all install a wheel
          # instead of silently compiling the sdist. (Amazon Linux 2 stays
          # out: its glibc is 2.26 AND its system python is < 3.9, so no
          # abi3-py39 wheel could serve it anyway.) Building bare on
          # ubuntu-latest tagged the wheel with the HOST glibc (2_34) —
          # that was the deploy-surface hole.
          - { os: ubuntu-latest,    platform: linux-x86_64,      manylinux: "2_28" }
          - { os: ubuntu-24.04-arm, platform: linux-aarch64,     manylinux: "2_28" }
          # musl (Alpine-based images), both arches
          - { os: ubuntu-latest,    platform: musllinux-x86_64,  manylinux: "musllinux_1_2", target: x86_64-unknown-linux-musl }
          - { os: ubuntu-24.04-arm, platform: musllinux-aarch64, manylinux: "musllinux_1_2", target: aarch64-unknown-linux-musl }
          - { os: macos-14,       platform: macos-arm64 }
          # GitHub retired Intel Mac runners (macos-13 queues forever);
          # the x86_64 wheel cross-compiles from the ARM runner instead —
          # abi3 + no host-python dependency makes this a pure rustc
          # target switch (maturin-action installs the rust target).
          - { os: macos-14,       platform: macos-x86_64, target: x86_64-apple-darwin }
          - { os: windows-latest, platform: windows-x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # D-329: the manylinux containers can't run git (missing binary /
      # dubious-ownership on the mounted workspace), so wheels stamped
      # certification()["commit"] = "unknown". The workspace file IS
      # mounted — write the short sha for bindings/build.rs to read.
      - name: Stamp build commit for certification()
        shell: bash
        run: echo "${GITHUB_SHA:0:7}" > .seine-commit
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release -m bindings/Cargo.toml -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -m bindings/Cargo.toml -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [differential, bindings, wheels, sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
          path: dist
      - name: Attach wheels + sdist to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true

  # crates.io rides the SAME gates as PyPI: tag-triggered, blocked on
  # the full differential job (the oracle-backed corpus gate), OIDC
  # Trusted Publishing (configure on crates.io: repo sl-agentics/seine,
  # workflow ci.yml, environment crates-io). First publish of a crate
  # must be manual (TP configs attach to existing crates); idempotent
  # on tag re-runs via the already-published check.
  publish-crates:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [differential, bindings, wheels, sdist]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write   # crates.io Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Tag matches the workspace version
        run: |
          VER="${GITHUB_REF_NAME#v}"
          TOML=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          test "$VER" = "$TOML" || { echo "tag v$VER != workspace $TOML"; exit 1; }
      - name: Already published?
        id: check
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if curl -s -H "User-Agent: seine-ci (github.com/sl-agentics/seine)" \
               "https://crates.io/api/v1/crates/seine-engine/$VER" | grep -q '"num"'; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: rust-lang/crates-io-auth-action@v1
        if: steps.check.outputs.published == 'false'
        id: auth
      - name: Publish seine-engine
        if: steps.check.outputs.published == 'false'
        run: cargo publish -p seine-engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [differential, bindings, wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
          path: dist
      # NOTE for anything that smoke-installs right after publishing:
      # PyPI's simple-index CDN lags the JSON API by minutes — install
      # by direct file URL or retry, or a good push reads as red.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
