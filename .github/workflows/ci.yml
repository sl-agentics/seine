name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The full differential gate: native tests + the entire scenario
  # corpus through BOTH engines (real Drools as the oracle).
  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: Swatinem/rust-cache@v2
      - name: Cache maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('oracle/pom.xml') }}
      - name: Build oracle
        run: cd oracle && mvn -q -DskipTests package
      - name: Native tests
        run: cargo test -q
      - name: Differential corpus
        run: make diff

  bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - name: Install test deps
        run: pip install polars pyarrow pytest maturin
      - name: Build + install seine-rs
        run: |
          maturin build --release -m bindings/Cargo.toml -o dist
          pip install dist/*.whl
      - name: Boundary + authoring + row tests
        run: pytest bindings/tests/ -q

  wheels:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  platform: linux-x86_64 }
          - { os: macos-14,       platform: macos-arm64 }
          # GitHub retired Intel Mac runners (macos-13 queues forever);
          # the x86_64 wheel cross-compiles from the ARM runner instead —
          # abi3 + no host-python dependency makes this a pure rustc
          # target switch (maturin-action installs the rust target).
          - { os: macos-14,       platform: macos-x86_64, target: x86_64-apple-darwin }
          - { os: windows-latest, platform: windows-x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release -m bindings/Cargo.toml -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -m bindings/Cargo.toml -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [differential, bindings, wheels, sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
          path: dist
      - name: Attach wheels + sdist to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [differential, bindings, wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheels-*,sdist}"
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
