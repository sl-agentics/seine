name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The full differential gate: native tests + the entire scenario
  # corpus through BOTH engines (real Drools as the oracle).
  differential:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: Swatinem/rust-cache@v2
      - name: Cache maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('oracle/pom.xml') }}
      - name: Build oracle
        run: cd oracle && mvn -q -DskipTests package
      - name: Native tests
        run: cargo test -q
      - name: Differential corpus
        run: make diff

  bindings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - name: Install test deps
        run: pip install polars pyarrow pytest maturin
      - name: Build + install seine-rs
        run: |
          maturin build --release -m bindings/Cargo.toml -o dist
          pip install dist/*.whl
      - name: Boundary + authoring + row tests
        run: pytest bindings/tests/ -q

  wheels:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -m bindings/Cargo.toml -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [differential, bindings, wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Attach wheels to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
